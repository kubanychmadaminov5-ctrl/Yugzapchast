<!<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoTetik</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.search {
    padding: 10px;
}

.search input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.add-form {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.add-form input {
    width: 100%;
    padding: 10px;
    margin-bottom: 5px;
}

.product {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.product-left {
    display: flex;
    gap: 10px;
}

.product img {
    width: 60px;
    height: 60px;
    border-radius: 5px;
    object-fit: cover;
}

.btn {
    background: #1976d2;
    color: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 10px;
    font-size: 24px;
}
</style>
</head>

<body>

<div class="header">MotoTetik.kg</div>

<div class="search">
    <input type="text" placeholder="Искать товары...">
</div>

<!-- Форма -->
<div class="add-form">
    <input type="text" id="name" placeholder="Название товара">
    <input type="number" id="price" placeholder="Цена">
    <input type="text" id="image" placeholder="Ссылка на фото (URL)">
    <button onclick="addProduct()">Добавить товар</button>
</div>

<div id="products"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function render() {
    const container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach((p) => {
        container.innerHTML += `
            <div class="product">
                <div class="product-left">
                    <img src="${p.image || 'https://via.placeholder.com/60'}">
                    <div>
                        <div>${p.name}</div>
                        <div>${p.price} сом/шт</div>
                    </div>
                </div>
                <button class="btn">+</button>
            </div>
        `;
    });
}

function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;

    if (!name || !price) {
        alert("Заполни название и цену");
        return;
    }

    products.push({name, price, image});
    localStorage.setItem("products", JSON.stringify(products));

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";

    render();
}

render();
</script>

</body>
</html> html>
